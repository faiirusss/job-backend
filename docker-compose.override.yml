services:
  backend:
    build:
      target: dev
    environment:
      USE_FAKE_LLM: "true"
    volumes:
      - ./:/app
      - hf-cache:/opt/hf-cache
      - backend-data:/app/data
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
